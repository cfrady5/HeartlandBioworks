<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff Dashboard – Heartland BioWorks</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" /><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/site.css" />
  <style>
    *,*::before,*::after{box-sizing:border-box;}
    body{margin:0;font-family:'Inter',system-ui,sans-serif;color:var(--hb-text);background:var(--hb-bg2);-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none;}
    /* keep dashboard clear of the fixed 90px navbar */
    .hb-dash-top{height:90px;}
  </style>
</head>
<body data-page="dashboard">
<div id="hb-header"></div>
<div class="hb-dash-top" aria-hidden="true"></div>

<!-- Protected: assets/dashboard.js calls HBAuth.requireAuth() and
     redirects to login.html if the visitor is not signed in. -->
<div id="hb-dashboard"></div>

<script src="data/news.js"></script>
<script src="data/events.js"></script>
<script src="data/media.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/supabase-config.js"></script>
<script src="assets/auth.js"></script>
<script src="assets/content-store.js"></script>
<script src="assets/uploads.js"></script>
<script src="assets/site.js" defer></script>
<script src="assets/dashboard.js" defer></script>
</body>
</html>
